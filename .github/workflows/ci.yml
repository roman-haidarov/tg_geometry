name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  spec:
    name: Ruby ${{ matrix.ruby }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Verify vendored sources
        run: bundle exec ruby script/vendor_libs.rb --verify
      - name: Run specs
        run: bundle exec rake spec

  gc-stress:
    name: GC.stress
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Run GC.stress specs
        run: bundle exec rake spec:gc_stress

  gc-compact:
    name: GC.compact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Run GC.compact-focused specs
        run: bundle exec rake spec:gc_compact
